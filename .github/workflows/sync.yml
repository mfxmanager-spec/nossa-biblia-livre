name: Sync Bible Chapters

on:
  schedule:
    - cron: '0 4 * * *' # Runs daily at 04:00 UTC (01:00 BRT)
  workflow_dispatch: # Allows manual execution from the GitHub Actions tab

permissions:
  contents: write # Needed to commit and push changes back to the repository

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install beautifulsoup4

      - name: Run sync and export
        run: python sync.py

      - name: Commit and push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          # Add database and static files to commit
          git add bible.db public/data/
          
          # Check if there are changes to commit
          if git diff --staged --quiet; then
            echo "No new chapters or updates found. Nothing to commit."
          else
            git commit -m "Auto-sync: Import new chapters and update books index [skip ci]"
            git push
          fi
